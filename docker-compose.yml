services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: michelin-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    restart: unless-stopped
    networks:
      - michelin-network

networks:
  michelin-network:
    external: true
